slam_toolbox:
  ros__parameters:
    mode: mapping
    odom_frame: odom
    map_frame: map
    base_frame: base_footprint
    scan_topic: /scan
    use_map_saver: true
    resolution: 0.05
    map_update_interval: 2.0
    transform_publish_period: 0.05
    minimum_travel_distance: 0.10
    minimum_travel_heading: 0.10
    use_scan_matching: true
    use_scan_barycenter: true
